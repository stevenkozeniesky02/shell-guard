name: Publish @agentsid/guard

# Publishes @agentsid/guard to npm with provenance attestation.
# Triggers on tags shaped `v*` (e.g. v0.1.1, v1.0.0).
# Requires NPM_TOKEN in repo secrets; provenance needs OIDC id-token.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (syntax-check + pack, skip publish)"
        type: boolean
        default: false

jobs:
  publish:
    name: Build, syntax-check, publish
    runs-on: ubuntu-latest
    permissions:
      # Required for npm provenance attestations (OIDC).
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          registry-url: "https://registry.npmjs.org"
          scope: "@agentsid"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Syntax-check entry point
        run: node --check src/index.mjs

      - name: Run test script
        run: npm test

      - name: Verify tarball contents
        run: npm pack --dry-run

      - name: Publish to npm (with provenance)
        if: ${{ !inputs.dry_run }}
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
